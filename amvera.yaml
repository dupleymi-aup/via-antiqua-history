meta:
  name: via-antiqua-history
  runtime: nodejs
  version: "22"

services:
  - name: via-antiqua-history
    type: nodejs
    buildCommand: npm ci && npm run build
    startCommand: node .next/standalone/server.js
    port: 80
    instances: 1
    memory: 1Gi
    cpu: 500m
    env:
      NODE_ENV: production
      PORT: "80"
