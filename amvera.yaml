meta:
  environment: node
  toolchain:
    name: npm
    version: "22"

build:
  additionalCommands: npm run build && sh scripts/copy-assets.sh

run:
  command: HOST=0.0.0.0 node .next/standalone/server.js
  containerPort: 3000
  persistenceMount: /data
  env:
    NODE_ENV: production
    DB_PATH: /data/app.db
    JWT_SECRET: ${JWT_SECRET}
    NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
