meta:
  environment: node
  toolchain:
    name: npm
    version: "22"

build:
  additionalCommands: npm run build

run:
  command: NODE_ENV=production npm run start
  containerPort: 3000
  persistenceMount: /data

env:
  HOST: 0.0.0.0
  DB_PATH: /data/app.db
  JWT_SECRET: ${JWT_SECRET}
  NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
  FASTPAY_WEBHOOK_SECRET: ${FASTPAY_WEBHOOK_SECRET}
  FASTPAY_SBP_PHONE: ${FASTPAY_SBP_PHONE}
  QR_CODE_API_URL: ${QR_CODE_API_URL}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASS: ${SMTP_PASS}
  SMTP_FROM: ${SMTP_FROM}
  SUBSCRIPTION_PRICE: ${SUBSCRIPTION_PRICE}
