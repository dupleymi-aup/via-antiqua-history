meta:
  environment: docker

run:
  containerPort: 3000
  persistenceMount: /data

env:
  HOST: 0.0.0.0
  DB_PATH: /data/app.db
  JWT_SECRET: ${JWT_SECRET}
  FASTPAY_WEBHOOK_SECRET: ${FASTPAY_WEBHOOK_SECRET}
  FASTPAY_SBP_PHONE: ${FASTPAY_SBP_PHONE}
  QR_CODE_API_URL: ${QR_CODE_API_URL}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASS: ${SMTP_PASS}
  SMTP_FROM: ${SMTP_FROM}
  SUBSCRIPTION_PRICE: ${SUBSCRIPTION_PRICE}
